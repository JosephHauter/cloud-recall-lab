name: Bug report
description: Report something broken in the app.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Chrome on Android, Safari on iPhone, Edge on Windows, etc."
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: Add screenshots or copied console errors if helpful.

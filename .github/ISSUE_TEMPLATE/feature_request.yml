name: Feature request
description: Suggest an improvement for learners.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What learner problem does this solve?
      description: Explain the study workflow or friction.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed feature
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important for launch
        - Accessibility or mobile blocker
    validations:
      required: true
